<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Popup Box</title>
  </head>
  <body>
    <div class="container"></div>
    <div id="modelBox">
      <img src="images/banner.png" width="100%" alt="banner" />
      <div class="offer-text">
        <h2>Get 15% OFF</h2>
        <small>on all beauty products</small>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Doloribus
          doloremque ab quasi architecto fugit repellendus ut explicabo
          consequuntur.
        </p>
        <form>
          <input type="email" placeholder="Email Address" />
          <button type="submit">Subscribe</button>
        </form>
      </div>
      <img src="images/close.png" alt="close icon" class="close-icon" />
    </div>
    <script src="main.js"></script>
  </body>
</html>
